
name: Generar serpiente

on:
  schedule:
    # Cada 12 horas (a las 00:00 y 12:00 UTC)
    - cron: "0 */12 * * *"
  # Permite ejecutarlo manualmente desde la pestaña "Actions"
  workflow_dispatch:
  # También se regenera con cada push a main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generar SVG de la serpiente
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Publicar en la rama output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
